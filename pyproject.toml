# Root uv workspace: the Python data layer is split into packages with a shared `neta-core`.
# The `api` project is intentionally EXCLUDED — it shares no code and stays an independent project
# (its own lockfile + Render build, untouched by the workspace). `web` is a separate npm workspace.
[tool.uv.workspace]
members = ["packages/neta-core", "packages/neta-sources", "ingestion"]
exclude = ["api", "web"]
