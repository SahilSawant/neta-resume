[project]
name = "neta-sources"
version = "0.1.0"
description = "Neta-Resume source clients (MyNeta, sansad, PRS, courts, data.gov.in, Google News, TCPD) — depend only on neta-core."
requires-python = ">=3.12"
dependencies = [
    "neta-core",
    "selectolax>=0.3",      # fast HTML parsing
    "beautifulsoup4>=4.12", # fallback HTML parsing
    "lxml>=5.0",
]

[tool.uv.sources]
neta-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["neta_sources"]

[tool.ruff]
line-length = 100
target-version = "py312"
